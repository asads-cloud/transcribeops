services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    profiles:
      - app

  worker:
    build: ./worker
    env_file:
      - .env
    profiles:
      - app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    profiles:
      - app